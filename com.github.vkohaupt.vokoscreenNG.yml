app-id: com.github.vkohaupt.vokoscreenNG
runtime: org.kde.Platform
runtime-version: 6.10
sdk: org.kde.Sdk
command: vokoscreenNG
rename-desktop-file: vokoscreenNG.desktop
rename-appdata-file: vokoscreenNG.appdata.xml
rename-icon: vokoscreenNG
finish-args:
  - --device=all
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --filesystem=home
  - --talk-name=org.kde.StatusNotifierWatcher

modules:

  # gstreamer-plugins-good wird benötigt da in GStreamer 1.26.10 ximagesrc nicht vorhanden ist
  - name: gstreamer-plugins-good
    buildsystem: meson
    sources:
      - type: archive
        url: https://gstreamer.freedesktop.org/src/gst-plugins-good/gst-plugins-good-1.26.10.tar.xz
        sha256: 7beacb5daba3c6751ebc1c85017d9b1d6de64e24798125932c73c8b1dbeb3bc9

  # Für das kompilieren von gstreamer-plugins-bad wird als runtime der openh264 codec benötigt
  - name: openh264
    buildsystem: meson
    sources:
      - type: git
        url: https://github.com/cisco/openh264.git
        branch: v2.6.0

  # gstreamer-plugins-bad beinhaltet openh264enc
  - name: gstreamer-plugins-bad
    buildsystem: meson
    sources:
      - type: archive
        url: https://gstreamer.freedesktop.org/src/gst-plugins-bad/gst-plugins-bad-1.26.10.tar.xz
        sha256: fec973dff512b507d9dcb5a828e04e061e52188f4d5989e953aed6a41beda437

  - name: vokoscreenNG
    buildsystem: qmake
    subdir: src
    post-install:
      - install -Dm755 vokoscreenNG ${FLATPAK_DEST}/bin/vokoscreenNG
      - install -Dm644 applications/vokoscreenNG.png ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/vokoscreenNG.png
      - install -Dm644 applications/vokoscreenNG.desktop ${FLATPAK_DEST}/share/applications/vokoscreenNG.desktop
      - install -Dm644 ../vokoscreenNG.appdata.xml ${FLATPAK_DEST}/share/metainfo/vokoscreenNG.appdata.xml
    sources:
      - type: git
        url: https://github.com/vkohaupt/vokoscreenNG.git
        tag: 4.9.0
        commit: bf0f358f7c7f19f9312af142e3480a9c1d20a65e
        x-checker-data:
          type: git
          tag-pattern: ^([\d.]+)$
      - type: file
        path: vokoscreenNG.appdata.xml
